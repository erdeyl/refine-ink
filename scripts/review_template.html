<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referee Report: {{ title }}</title>
    <style>
        @page {
            margin: 2.5cm;
            size: A4;
        }
        body {
            font-family: "Georgia", "Times New Roman", "Garamond", serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #1a1a1a;
            max-width: 48em;
            margin: 2em auto;
            padding: 0 1.5em;
            background: #fff;
        }
        h1 {
            font-size: 1.6em;
            border-bottom: 2px solid #333;
            padding-bottom: 0.3em;
            margin-top: 1.5em;
        }
        h2 {
            font-size: 1.3em;
            border-bottom: 1px solid #ccc;
            padding-bottom: 0.2em;
            margin-top: 1.8em;
            color: #2c3e50;
        }
        h3 {
            font-size: 1.1em;
            margin-top: 1.5em;
            color: #34495e;
        }
        p {
            margin: 0.8em 0;
            text-align: justify;
            hyphens: auto;
        }
        .metadata {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 1em 1.5em;
            margin: 1.5em 0;
            font-size: 0.95em;
        }
        .metadata strong {
            color: #2c3e50;
        }
        blockquote {
            border-left: 3px solid #7f8c8d;
            margin: 1em 0;
            padding: 0.5em 1em;
            background: #fafafa;
            font-style: italic;
            color: #555;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
            font-size: 0.9em;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 0.5em 0.8em;
            text-align: left;
        }
        th {
            background: #f1f3f5;
            font-weight: bold;
            color: #2c3e50;
        }
        tr:nth-child(even) {
            background: #f8f9fa;
        }
        code {
            background: #f4f4f4;
            padding: 0.15em 0.4em;
            border-radius: 3px;
            font-size: 0.9em;
            font-family: "Courier New", monospace;
        }
        pre {
            background: #f4f4f4;
            padding: 1em;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 0.85em;
        }
        hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 2em 0;
        }
        .appendix {
            font-size: 0.9em;
            color: #555;
        }
        .severity-critical { color: #c0392b; font-weight: bold; }
        .severity-major { color: #d35400; font-weight: bold; }
        .severity-minor { color: #2980b9; }
        .severity-suggestion { color: #27ae60; }
        .correction {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 4px;
            padding: 0.8em 1em;
            margin: 0.5em 0;
        }
        .correction-label {
            font-weight: bold;
            color: #856404;
            font-size: 0.9em;
        }
        @media print {
            body {
                font-size: 10pt;
                margin: 0;
                padding: 0;
                max-width: none;
            }
            .no-print { display: none; }
        }
    </style>
</head>
<body>
    {{ content }}
    <footer class="appendix no-print" style="margin-top: 3em; padding-top: 1em; border-top: 1px solid #ddd;">
        <p><em>Generated by refine-ink review system on {{ date }}</em></p>
    </footer>
</body>
</html>
